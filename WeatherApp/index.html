<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🌤 Weather App</h1>

        <div class="search-box">
            <input
                type="text"
                id="input1"
                placeholder="Enter City Name">
            <button id="myButton">
                Get Weather
            </button>
        </div>

        <div class="weather-card">
            <p id="Result">Enter a city to get weather information.</p>
        </div>

    </div>

    <script src="index.js"></script>

</body>
</html>
