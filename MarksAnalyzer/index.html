<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Student Result Analyzer</title>
</head>
<body>

    <h1>Student Result Analyzer</h1>

    <label>Student Name</label><br>
    <input type="text" id="myName"><br>

    <p id="counter">Characters: 0</p>

    <label>Subject 1 Marks</label><br>
    <input type="number" id="m1"><br><br>

    <label>Subject 2 Marks</label><br>
    <input type="number" id="m2"><br><br>

    <label>Subject 3 Marks</label><br>
    <input type="number" id="m3"><br><br>

    <label>Subject 4 Marks</label><br>
    <input type="number" id="m4"><br><br>

    <label>Subject 5 Marks</label><br>
    <input type="number" id="m5"><br><br>

    <button id="addStudent">Add Student</button>
    <button id="analyzeBtn">Analyze All Students</button>

    <h2>Students</h2>
    <div id="studentList"></div>

    <h2>Analysis</h2>
    <div id="display"></div>

    <script src="index.js"></script>

</body>
</html>
