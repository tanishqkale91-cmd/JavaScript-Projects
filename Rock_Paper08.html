<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors</title>
</head>
<body>

  <button onclick="playGame('rock')">
    Rock
  </button>

  <button onclick="playGame('paper')">
    Paper
  </button>

  <button onclick="playGame('scissors')">
    Scissors
  </button>

  <button onclick="score.wins = 0,score.losses = 0,score.tie = 0">Reset Score</button>

  <script>
    const score = {
      wins:0,losses:0,tie:0
    };

    function playGame(playerMove) {
      const randomNumber = Math.random();

      let computerMove = '';

      if (randomNumber < 1 / 3) {
        computerMove = 'rock';
      } else if (randomNumber < 2 / 3) {
        computerMove = 'paper';
      } else {
        computerMove = 'scissors';
      }

      let result = '';

      if (playerMove === 'rock') {
        if (computerMove === 'rock') {
          result = 'Tie';
        } else if (computerMove === 'paper') {
          result = 'You lose';
        } else {
          result = 'You win';
        }
      }

      if (playerMove === 'paper') {
        if (computerMove === 'rock') {
          result = 'You win';
        } else if (computerMove === 'paper') {
          result = 'Tie';
        } else {
          result = 'You lose';
        }
      }

      if (playerMove === 'scissors') {
        if (computerMove === 'rock') {
          result = 'You lose';
        } else if (computerMove === 'paper') {
          result = 'You win';
        } else {
          result = 'Tie';
        }
      }if (result === 'You win.') {
        score.wins++;
      }else if (result === 'You lose.') {
        score.losses++;
      }else if (result === 'Tie.') {
        score.ties++;
      }



      alert(
        `You picked ${playerMove}.
Computer picked ${computerMove}.
${result}
Wins: ${score.wins},Losses: ${score.losses},Ties: ${score.ties}`
      );
    }
  </script>

</body>
</html>
